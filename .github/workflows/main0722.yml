name: ESP32 固件编译调试
on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: 安装ESP-IDF 4.4 稳定版
        run: |
          git clone --depth 1 -b v4.4 https://github.com/espressif/esp-idf.git ~/esp-idf
          cd ~/esp-idf
          export IDF_GITHUB_ASSETS="dl.espressif.cn/github_assets"
          export PIP_INDEX_URL=https://pypi.tuna.tsinghua.edu.cn/simple
          ./install.sh esp32c3

      - name: 编译固件 ESP32_GENERIC_C3
        run: |
          source ~/esp-idf/export.sh
          cd ports/esp32
          # 全程禁用Ninja，只用传统Make构建
          unset CMAKE_GENERATOR
          EXTRA_CFLAGS="-Wno-error" make BOARD=ESP32_GENERIC_C3 GENERATE_CERTS=0 -j1

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          path: ports/esp32/build-ESP32_GENERIC_C3/firmware.bin
          name: esp32_firmware_test
