name: Build ESP32S3 Firmware
on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Install ESP-IDF 5.1.1
        run: |
          git clone --depth 1 -b v5.1.1 https://github.com/espressif/esp-idf.git ~/esp-idf
          cd ~/esp-idf
          export IDF_GITHUB_ASSETS="dl.espressif.cn/github_assets"
          export PIP_INDEX_URL=https://pypi.tuna.tsinghua.edu.cn/simple
          ./install.sh esp32s3

      - name: Compile firmware
        run: |
          source ~/esp-idf/export.sh
          cd ports/esp32
          
          # 关键步骤：修改 extmod.cmake，注释掉强制检查 berkeley-db 的代码行
          echo "正在修补 extmod.cmake 以跳过 berkeley-db 检查..."
          sed -i 's/^\([[:space:]]*\)message(FATAL_ERROR "MICROPY_PY_BTREE is enabled but the berkeley-db submodule is not initialised.*/ \1# DISABLED BY CI: message(FATAL_ERROR "MICROPY_PY_BTREE is enabled but the berkeley-db submodule is not initialised. Run 'make BOARD=${BOARD} submodules'")/' ../../extmod/extmod.cmake
          
          # 同时，在 mpconfigport.h 中强制禁用 btree，确保万无一失
          echo "正在强制禁用 MICROPY_PY_BTREE..."
          echo "#undef MICROPY_PY_BTREE" >> mpconfigport.h
          echo "#define MICROPY_PY_BTREE (0)" >> mpconfigport.h
          
          # 然后正常编译
          EXTRA_CFLAGS="-Wno-error" make BOARD=UM_TINYS3 GENERATE_CERTS=0 -j1

      - name: Download bin
        uses: actions/upload-artifact@v4
        with:
          path: ports/esp32/build-UM_TINYS3/firmware.bin
          name: firmware_s3
