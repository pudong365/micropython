
name: ESP32-S3 Custom Firmware Build

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout MicroPython source
        uses: actions/checkout@v4
        with:
          submodules: true  # 关键：MicroPython 依赖 mpy-cross 等子模块，必须设为 true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"  # 推荐使用较新的 Python 3.10+，兼容性更好

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget flex bison gperf python3-pip python3-venv cmake ninja-build ccache libffi-dev libssl-dev dfu-util libusb-1.0-0

      - name: Cache ESP-IDF tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.espressif
            ~/esp-idf
          key: ${{ runner.os }}-idf-v5.1-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-idf-v5.1-

      - name: Setup ESP-IDF v5.1
        run: |
          # 克隆 ESP-IDF v5.1 (推荐用于 MicroPython v1.22+)
          git clone --depth 1 -b release/v5.1 https://github.com/espressif/esp-idf.git ~/esp-idf
          cd ~/esp-idf
          # 设置国内镜像加速下载 (可选)
          export IDF_GITHUB_ASSETS="dl.espressif.cn/github_assets"
          ./install.sh esp32s3

      - name: Build MicroPython Cross Compiler
        run: |
          make -C mpy-cross

      - name: Build ESP32-S3 Firmware
        run: |
          source ~/esp-idf/export.sh
          cd ports/esp32
          
          # 关键修正：使用标准的 GENERIC_S3 板型
          # 如果需要 Octal PSRAM，可以添加 BOARD_VARIANT=SPIRAM_OCT
          # 例如: make BOARD=ESP32_GENERIC_S3 BOARD_VARIANT=SPIRAM_OCT USER_C_MODULES=...
          
          make BOARD=ESP32_GENERIC_S3 -j$(nproc)

      - name: Upload Compiled Firmware
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3_generic_firmware
          path: ports/esp32/build-ESP32_GENERIC_S3/firmware.bin
          if-no-files-found: error
