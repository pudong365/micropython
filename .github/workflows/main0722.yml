name: Build ESP32S3 Firmware
on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Install ESP-IDF 5.0
        run: |
          git clone --depth 1 -b v5.0 https://github.com/espressif/esp-idf.git ~/esp-idf
          cd ~/esp-idf
          export IDF_GITHUB_ASSETS="dl.espressif.cn/github_assets"
          export PIP_INDEX_URL=https://pypi.tuna.tsinghua.edu.cn/simple
          # 先升级 pip 到兼容版本
          python -m pip install --upgrade pip==24.0
          python -m pip install setuptools
          ./install.sh esp32s3

      - name: Compile firmware
        run: |
          source ~/esp-idf/export.sh
          cd ports/esp32
          # 固定使用兼容性最好的 UM_TINYS3
          EXTRA_CFLAGS="-Wno-error" make BOARD=UM_TINYS3 GENERATE_CERTS=0 -j1

      - name: Download bin
        uses: actions/upload-artifact@v4
        with:
          path: ports/esp32/build-UM_TINYS3/firmware.bin
          name: firmware_s3
