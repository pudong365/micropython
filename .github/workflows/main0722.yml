name: Build ESP32S3 Firmware
on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: espressif/idf:v5.0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Build firmware
        run: |
          cd ports/esp32
          rm -rf build sdkconfig
          export CONFIG_ESPTOOLPY_FLASHSIZE_16MB=y
          export CONFIG_SPIRAM=y
          export CONFIG_SPIRAM_MODE_OCT=y
          make BOARD=GENERIC_S3 -j4

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: ports/esp32/build-GENERIC_S3/firmware.bin
          retention-days: 30
