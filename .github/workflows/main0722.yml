name: Build ESP32S3 Firmware
on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: espressif/idf:v5.0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Build firmware
        run: |
          # 先加载 ESP-IDF 环境变量
          source /opt/esp/idf/export.sh
          
          cd ports/esp32
          
          # 清理旧配置
          rm -rf build sdkconfig
          
          # 设置目标芯片
          idf.py set-target esp32s3
          
          # 设置 Flash 和 PSRAM 环境变量
          export CONFIG_ESPTOOLPY_FLASHSIZE_16MB=y
          export CONFIG_SPIRAM=y
          export CONFIG_SPIRAM_MODE_OCT=y
          
          # 编译
          make BOARD=UM_TINYS3 -j4

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: ports/esp32/build-UM_TINYS3/firmware.bin
          retention-days: 30
