name: Build ESP32S3 Firmware
on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install ESP-IDF
        run: |
          git clone --depth 1 -b v5.0 https://github.com/espressif/esp-idf.git ~/esp-idf
          cd ~/esp-idf
          # 安装前先确保 pip 和 setuptools 是最新的
          python -m pip install --upgrade pip setuptools wheel
          ./install.sh esp32s3

      - name: Build firmware
        run: |
          source ~/esp-idf/export.sh
          cd ports/esp32
          make BOARD=UM_TINYS3 -j4

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: ports/esp32/build-UM_TINYS3/firmware.bin
