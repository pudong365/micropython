name: Build ESP32-S3 MicroPython Firmware (v1.22.2)

on:
  push:
    branches: [ "v1.22.2" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: espressif/idf:v5.1.4

    steps:
    - name: Checkout MicroPython repo
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Enable deflate compression
      run: echo '#define MICROPY_PY_DEFLATE_COMPRESS (1)' >> ports/esp32/mpconfigport.h

    - name: Build mpy-cross
      run: make -C mpy-cross -j2

    - name: Auto-fix ESP-IDF v5.1.4 compatibility issues
      run: |
        # 修复 WIFI_AUTH_MAX 的值 (14 -> 15)
        sed -i 's/WIFI_AUTH_MAX == 14/WIFI_AUTH_MAX == 15/g' ports/esp32/network_wlan.c || true

        # 修复蓝牙 NimBLE 模块中重复的变量定义 (避免 MP-XX 冲突)
        sed -i 's/extern uint16_t ble_hs_max_attrs;/extern uint16_t mp_ble_hs_max_attrs;/g' extmod/nimble/modbluetooth_nimble.c || true
        sed -i 's/extern uint16_t ble_hs_max_services;/extern uint16_t mp_ble_hs_max_services;/g' extmod/nimble/modbluetooth_nimble.c || true
        sed -i 's/extern uint16_t ble_hs_max_client_configs;/extern uint16_t mp_ble_hs_max_client_configs;/g' extmod/nimble/modbluetooth_nimble.c || true

        # Python 脚本作为备用方案
        python3 -c "
import re
import os

def fix_file(file_path, pattern, replacement):
    if not os.path.exists(file_path):
        print(f'File not found: {file_path}, skipping...')
        return
    with open(file_path, 'r') as f:
        content = f.read()
    new_content = re.sub(pattern, replacement, content)
    if new_content != content:
        with open(file_path, 'w') as f:
            f.write(new_content)
        print(f'Fixed: {file_path}')
    else:
        print(f'No change needed: {file_path}')

# 修复 network_wlan.c
fix_file('ports/esp32/network_wlan.c', r'WIFI_AUTH_MAX == 14', 'WIFI_AUTH_MAX == 15')

# 修复 modbluetooth_nimble.c
fix_file('extmod/nimble/modbluetooth_nimble.c', r'extern uint16_t ble_hs_max_attrs;', 'extern uint16_t mp_ble_hs_max_attrs;')
fix_file('extmod/nimble/modbluetooth_nimble.c', r'extern uint16_t ble_hs_max_services;', 'extern uint16_t mp_ble_hs_max_services;')
fix_file('extmod/nimble/modbluetooth_nimble.c', r'extern uint16_t ble_hs_max_client_configs;', 'extern uint16_t mp_ble_hs_max_client_configs;')
"
      shell: bash

    - name: Build ESP32-S3 firmware
      run: |
        cd ports/esp32
        make submodules
        make BOARD=ESP32_GENERIC_S3

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: micropython-firmware
        path: ports/esp32/build-ESP32_GENERIC_S3/firmware.bin
