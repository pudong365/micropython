name: Build ESP32-S3 MicroPython Firmware (v1.22.2)

on:
  push:
    branches: [ "v1.22.2" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: espressif/idf:v5.1.4

    steps:
    - name: Checkout MicroPython repo
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Build mpy-cross
      run: make -C mpy-cross -j2

    - name: Auto-fix compatibility issues
      run: |
        sed -i 's/WIFI_AUTH_MAX == 14/WIFI_AUTH_MAX == 15/g' ports/esp32/network_wlan.c || true
        sed -i 's/extern uint16_t ble_hs_max_attrs;/extern uint16_t mp_ble_hs_max_attrs;/g' extmod/nimble/modbluetooth_nimble.c || true
        sed -i 's/extern uint16_t ble_hs_max_services;/extern uint16_t mp_ble_hs_max_services;/g' extmod/nimble/modbluetooth_nimble.c || true
        sed -i 's/extern uint16_t ble_hs_max_client_configs;/extern uint16_t mp_ble_hs_max_client_configs;/g' extmod/nimble/modbluetooth_nimble.c || true

    - name: Build ESP32-S3 firmware
      working-directory: ./ports/esp32
      run: |
        # 加载 ESP-IDF 环境变量
        source /opt/esp/idf/export.sh
        make submodules
        make BOARD=ESP32_GENERIC_S3

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: micropython-firmware
        path: ports/esp32/build-ESP32_GENERIC_S3/firmware.bin
