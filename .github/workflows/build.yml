name: Build ESP32-S3 MicroPython Firmware

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: espressif/idf:v5.0.4

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Build mpy-cross
      run: |
        . /opt/esp/idf/export.sh
        make -C mpy-cross -j2

    - name: Build ESP32-S3 firmware
      run: |
        . /opt/esp/idf/export.sh
        cd ports/esp32
        make submodules
        make BOARD=ESP32_GENERIC_S3

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: micropython-firmware
        path: ports/esp32/build-ESP32_GENERIC_S3/firmware.bin
