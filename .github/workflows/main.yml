name: Build Custom ESP32-S3 MicroPython
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Download ESP-IDF v4.4
        run: |
          git clone -b v4.4 --recursive shturl.cc/8NjSP8PEUaixs4MixUsguXLTI5qcY ~/esp-idf
          cd ~/esp-idf
          export IDF_GITHUB_ASSETS="dl.espressif.cn/github_assets"
          export PIP_INDEX_URL=https://pypi.tuna.tsinghua.edu.cn/simple
          ./install.sh esp32s3

      - name: Build MicroPython Firmware
        run: |
          source ~/esp-idf/export.sh
          cd ports/esp32
          make BOARD=ESP32S3 GENERATE_CERTS=0 -j4

      - name: Upload Firmware Bin
        uses: actions/upload-artifact@v4
        with:
          path: ports/esp32/build/firmware.bin
          name: esp32s3-firmware
